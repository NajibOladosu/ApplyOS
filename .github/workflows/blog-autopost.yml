name: Blog Autopost

on:
  schedule:
    # Mon + Thu at 14:00 UTC (~10am ET / 3pm BST)
    - cron: '0 14 * * 1'
    - cron: '0 14 * * 4'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Generate post
        id: gen
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-blog-post.mjs

      - name: Configure git
        run: |
          git config user.name "applyos-bot"
          git config user.email "bot@applyos.io"

      - name: Commit + push branch
        id: push
        env:
          POST_PATH: ${{ steps.gen.outputs.path }}
          POST_TITLE: ${{ steps.gen.outputs.title }}
          POST_SLUG: ${{ steps.gen.outputs.slug }}
        run: |
          BRANCH="blog/${POST_SLUG}-${GITHUB_RUN_ID}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          git checkout -b "${BRANCH}"
          git add -- "$POST_PATH"
          git commit -m "blog: $POST_TITLE" -m "Auto-generated post: $POST_SLUG"
          git push origin "${BRANCH}"

      - name: Open PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.push.outputs.branch }}
          POST_TITLE: ${{ steps.gen.outputs.title }}
          POST_SLUG: ${{ steps.gen.outputs.slug }}
        run: |
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "blog: ${POST_TITLE}" \
            --body "Auto-generated post: \`${POST_SLUG}\`"
          gh pr merge "${BRANCH}" --auto --squash --delete-branch
